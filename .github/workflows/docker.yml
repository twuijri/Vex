name: Build & Push Docker Image

on:
  push:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & Push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ghcr.io/${{ github.repository_owner }}/vex:latest

      - name: Notify Dockhand (redeploy)
        if: vars.DOCKHAND_WEBHOOK_URL != ''
        run: |
          if [ -n "${{ secrets.DOCKHAND_WEBHOOK_URL }}" ]; then
            curl -s -X POST "${{ secrets.DOCKHAND_WEBHOOK_URL }}"
          fi
